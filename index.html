<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Speech Spark</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    max-width: 480px;
    margin: 80px auto;
    padding: 0 20px;
    color: #222;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 8px;
  }
  p {
    color: #555;
    line-height: 1.5;
  }
  form {
    margin-top: 24px;
    display: flex;
    gap: 8px;
  }
  input[type="email"] {
    flex: 1;
    padding: 10px 12px;
    font-size: 15px;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  button {
    padding: 10px 18px;
    font-size: 15px;
    border: none;
    border-radius: 4px;
    background: #222;
    color: white;
    cursor: pointer;
  }
  button:disabled {
    background: #999;
    cursor: not-allowed;
  }
  #message {
    margin-top: 16px;
    font-size: 14px;
  }
  .success { color: #1a7f37; }
  .error { color: #c0392b; }
</style>
</head>
<body>

  <h1>Join Speech Spark</h1>
  <p>Enter your email to request access as a reader on our Hack Club member list.</p>

  <form id="signup-form">
    <input type="email" id="email" name="email" placeholder="you@example.com" required>
    <button type="submit" id="submit-btn">Submit</button>
  </form>

  <div id="message"></div>

  <script>
    // Paste the URL you get after deploying the Apps Script web app.
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxBNKCpEGsXcUkKNC3frCa-GshLg-KDt2KtvlIRW4iBz4-kug95wF45A3uNKWVSCkEG/exec";

    const form = document.getElementById("signup-form");
    const emailInput = document.getElementById("email");
    const submitBtn = document.getElementById("submit-btn");
    const messageEl = document.getElementById("message");

    form.addEventListener("submit", async function (event) {
      event.preventDefault();
      messageEl.textContent = "";
      messageEl.className = "";

      const email = emailInput.value.trim();

      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      try {
        const response = await fetch(SCRIPT_URL, {
          method: "POST",
          // text/plain avoids a CORS preflight request, which Apps Script
          // web apps do not handle. The body is still valid JSON text.
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify({ email: email })
        });

        const result = await response.json();

        if (result.success) {
          form.reset();
          messageEl.textContent = "You're on the list — keep an eye out for an email from Hack Club to accept your invite.";
          messageEl.className = "success";
        } else {
          messageEl.textContent = result.error || "Something went wrong. Please try again.";
          messageEl.className = "error";
        }
      } catch (err) {
        messageEl.textContent = "Couldn't reach the signup service. Please try again in a moment.";
        messageEl.className = "error";
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Submit";
      }
    });
  </script>

</body>
</html>
